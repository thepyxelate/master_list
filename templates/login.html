{% extends 'base.html' %}

{% block body %}
<div class="login-container" style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; ">
    <h2>Tizimga kirish</h2>
    <form method="POST">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label for="password">Parol:</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 20px; width: 100%;">kirish</button>
    </form>
    {% with messages = get_flashed_messages() %}
     {% if messages %}
      {% for message in messages %}
       <p style="color: red; margin-top: 10px;">{{ message }}</p>
       {% endfor %}
     {% endif %}
    {% endwith %}
</div>
{% endblock %}
